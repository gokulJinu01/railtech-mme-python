name: Publish to PyPI

# Fires when a tag matching v* is pushed (e.g., v0.1.0).
# Uses PyPI trusted publishing via OIDC — NO PyPI API token in GitHub secrets.
# Configure once at https://pypi.org/manage/project/railtech-mme/settings/publishing/

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish ${{ github.ref_name }} to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/railtech-mme/
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
